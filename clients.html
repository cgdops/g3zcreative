<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Client Area | G3Z Creative</title>
  <meta name="description" content="Secure portal for G3Z Creative clients to access presentations, audits, and marketing decks.">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="css/normalize.css" rel="stylesheet" type="text/css">
  <link href="css/webflow.css" rel="stylesheet" type="text/css">
  <link href="css/g3zc.webflow.css" rel="stylesheet" type="text/css">
  <link href="https://fonts.googleapis.com" rel="preconnect">
  <link href="https://fonts.gstatic.com" rel="preconnect" crossorigin="anonymous">
  <script src="https://ajax.googleapis.com/ajax/libs/webfont/1.6.26/webfont.js" type="text/javascript"></script>
  <script type="text/javascript">
    WebFont.load({
      google: {
        families: ["Figtree:300,400,500,600,700", "Young Serif:regular"]
      }
    });
  </script>
  <link href="images/favicon.png" rel="shortcut icon" type="image/x-icon">
  <link href="images/webclip.png" rel="apple-touch-icon">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined">

  <style>
    /* Reset & Theme Styles */
    :root {
      --bg-dark: #080b10;
      --card-bg: rgba(20, 26, 38, 0.6);
      --card-border: rgba(255, 255, 255, 0.08);
      --accent: #f42564;
      --accent-gradient: linear-gradient(135deg, #f42564 0%, #ff5e62 100%);
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
      --glow-color: rgba(244, 37, 100, 0.15);
    }

    body.client-portal-body {
      background-color: var(--bg-dark);
      color: var(--text-main);
      font-family: 'Figtree', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      margin: 0;
      overflow-x: hidden;
      position: relative;
    }

    /* Ambient Background Glows */
    .ambient-glow-1 {
      position: fixed;
      top: -10%;
      left: -10%;
      width: 50vw;
      height: 50vw;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(244, 37, 100, 0.1) 0%, rgba(244, 37, 100, 0) 70%);
      filter: blur(80px);
      z-index: -1;
      pointer-events: none;
      animation: float-glow 20s infinite alternate ease-in-out;
    }

    .ambient-glow-2 {
      position: fixed;
      bottom: -10%;
      right: -10%;
      width: 50vw;
      height: 50vw;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(99, 102, 241, 0.08) 0%, rgba(99, 102, 241, 0) 70%);
      filter: blur(80px);
      z-index: -1;
      pointer-events: none;
      animation: float-glow 25s infinite alternate-reverse ease-in-out;
    }

    @keyframes float-glow {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(5%, 5%) scale(1.1); }
    }

    /* Lock Screen Layout */
    .portal-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      z-index: 1;
    }

    .lock-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 24px;
      padding: 3rem 2.5rem;
      width: 100%;
      max-width: 460px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 
                  0 0 50px rgba(244, 37, 100, 0.05);
      text-align: center;
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      position: relative;
    }

    .lock-card:hover {
      border-color: rgba(244, 37, 100, 0.25);
      box-shadow: 0 24px 48px rgba(0, 0, 0, 0.45), 
                  0 0 60px rgba(244, 37, 100, 0.08);
    }

    .brand-header {
      margin-bottom: 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
    }

    .brand-logo {
      height: 48px;
      width: auto;
      filter: drop-shadow(0 0 8px var(--glow-color));
      transition: transform 0.3s ease;
    }

    .lock-card:hover .brand-logo {
      transform: scale(1.05);
    }

    .brand-title {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin: 0;
      background: linear-gradient(180deg, #ffffff 0%, #d1d5db 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .portal-subtitle {
      color: var(--text-muted);
      font-size: 0.95rem;
      line-height: 1.5;
      margin: 0 0 2rem 0;
    }

    /* Input Field Styling */
    .input-group {
      position: relative;
      margin-bottom: 1.5rem;
      text-align: left;
    }

    .input-group label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
    }

    .password-wrapper {
      position: relative;
    }

    .password-input {
      width: 100%;
      background: rgba(8, 11, 16, 0.7);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 14px 48px 14px 16px;
      color: var(--text-main);
      font-size: 1rem;
      transition: all 0.3s ease;
      box-sizing: border-box;
      outline: none;
    }

    .password-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(244, 37, 100, 0.15);
      background: rgba(8, 11, 16, 0.9);
    }

    .visibility-toggle {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 0;
      display: flex;
      align-items: center;
      transition: color 0.2s ease;
    }

    .visibility-toggle:hover {
      color: var(--text-main);
    }

    .visibility-toggle .material-symbols-outlined {
      font-size: 20px;
    }

    /* Access Button */
    .access-btn {
      width: 100%;
      background: var(--accent-gradient);
      border: none;
      border-radius: 12px;
      padding: 14px;
      color: white;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      transition: all 0.3s ease;
      box-shadow: 0 4px 12px rgba(244, 37, 100, 0.3);
    }

    .access-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(244, 37, 100, 0.4);
      filter: brightness(1.1);
    }

    .access-btn:active {
      transform: translateY(1px);
    }

    .access-btn:disabled {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-muted);
      cursor: not-allowed;
      box-shadow: none;
    }

    /* Error Message Shake Animation */
    .error-msg {
      color: #ef4444;
      font-size: 0.85rem;
      margin-top: 1rem;
      display: none;
      align-items: center;
      justify-content: center;
      gap: 0.25rem;
      animation: shake 0.4s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-6px); }
      40%, 80% { transform: translateX(6px); }
    }

    /* Spinner style */
    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 0.8s linear infinite;
      display: none;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Decrypted Layout Styling */
    #unlocked-content {
      display: none;
      opacity: 0;
      transition: opacity 0.6s ease;
      padding: 4rem 2rem;
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
      box-sizing: border-box;
    }

    /* Unlocked Content Styles (Matches index styling) */
    .unlocked-container {
      display: flex;
      flex-direction: column;
      gap: 3rem;
    }

    .client-header {
      text-align: center;
      max-width: 700px;
      margin: 0 auto;
    }

    .client-header h2 {
      font-size: 2.75rem;
      font-weight: 700;
      margin: 0.5rem 0 1rem 0;
      letter-spacing: -0.03em;
      font-family: 'Young Serif', serif;
      background: linear-gradient(135deg, #ffffff 0%, #9ca3af 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .client-header .badge {
      display: inline-block;
      background: rgba(244, 37, 100, 0.1);
      border: 1px solid rgba(244, 37, 100, 0.2);
      color: var(--accent);
      padding: 6px 14px;
      border-radius: 100px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .client-header p {
      color: var(--text-muted);
      font-size: 1.1rem;
      line-height: 1.6;
    }

    .deck-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 2rem;
    }

    .deck-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      overflow: hidden;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      display: flex;
      flex-direction: column;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    }

    .deck-card:hover {
      transform: translateY(-4px);
      border-color: rgba(244, 37, 100, 0.25);
      box-shadow: 0 15px 35px rgba(244, 37, 100, 0.06), 0 10px 40px rgba(0, 0, 0, 0.35);
    }

    .deck-preview {
      height: 160px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .deck-preview.intro-deck { background: linear-gradient(135deg, #1e1b4b 0%, #31102f 100%); }
    .deck-preview.seo-deck { background: linear-gradient(135deg, #062f4f 0%, #000000 100%); }
    .deck-preview.cro-deck { background: linear-gradient(135deg, #111827 0%, #1e1b4b 100%); }

    .glow-orb {
      position: absolute;
      width: 100px;
      height: 100px;
      background: var(--accent);
      filter: blur(50px);
      opacity: 0.4;
      pointer-events: none;
    }

    .deck-preview .icon {
      font-size: 48px;
      color: rgba(255, 255, 255, 0.8);
      z-index: 1;
      filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.3));
    }

    .deck-info {
      padding: 1.75rem;
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    .deck-info h3 {
      font-size: 1.25rem;
      font-weight: 600;
      margin: 0 0 0.75rem 0;
      color: #ffffff;
    }

    .deck-info p {
      font-size: 0.92rem;
      color: var(--text-muted);
      line-height: 1.5;
      margin: 0 0 1.5rem 0;
      flex: 1;
    }

    .deck-meta {
      display: flex;
      justify-content: space-between;
      border-top: 1px solid var(--card-border);
      padding-top: 1rem;
      margin-bottom: 1.25rem;
      font-size: 0.78rem;
      color: var(--text-muted);
    }

    .deck-actions {
      display: flex;
      gap: 0.75rem;
    }

    .deck-btn {
      flex: 1;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.88rem;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s ease;
    }

    .deck-btn.primary {
      background: var(--accent-gradient);
      color: white;
    }

    .deck-btn.primary:hover {
      filter: brightness(1.15);
    }

    .deck-btn.secondary {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--card-border);
      color: var(--text-main);
    }

    .deck-btn.secondary:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.2);
    }

    .deck-btn .material-symbols-outlined {
      font-size: 16px;
    }

    .client-footer {
      text-align: center;
      border-top: 1px solid var(--card-border);
      padding-top: 2rem;
      margin-top: 2rem;
      color: var(--text-muted);
      font-size: 0.92rem;
    }

    .client-footer a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }

    .client-footer a:hover {
      text-decoration: underline;
    }

    /* Navigation Back Button */
    .portal-nav {
      width: 100%;
      padding: 1.5rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-sizing: border-box;
    }

    .back-to-home {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      transition: color 0.2s ease;
    }

    .back-to-home:hover {
      color: var(--text-main);
    }

    .back-to-home .material-symbols-outlined {
      font-size: 18px;
    }

    .logout-btn {
      display: none;
      align-items: center;
      gap: 0.4rem;
      color: var(--text-muted);
      background: none;
      border: none;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 500;
      padding: 0;
      transition: color 0.2s ease;
    }

    .logout-btn:hover {
      color: var(--accent);
    }

    .logout-btn .material-symbols-outlined {
      font-size: 18px;
    }

    @media (max-width: 600px) {
      .lock-card {
        padding: 2rem 1.5rem;
      }
      .client-header h2 {
        font-size: 2rem;
      }
      .deck-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body class="client-portal-body">
  <div class="ambient-glow-1"></div>
  <div class="ambient-glow-2"></div>

  <!-- Portal Header Bar -->
  <header class="portal-nav">
    <a href="index.html" class="back-to-home">
      <span class="material-symbols-outlined">arrow_back</span> Back to Home
    </a>
    <button id="logout-button" class="logout-btn" onclick="logout()">
      <span class="material-symbols-outlined">logout</span> Log Out
    </button>
  </header>

  <!-- Login Area -->
  <div id="login-portal" class="portal-wrapper">
    <div class="lock-card">
      <div class="brand-header">
        <img src="images/g-brand-primary.svg" alt="G3Z Creative" class="brand-logo">
        <h1 class="brand-title">Client Workspace</h1>
      </div>
      <p class="portal-subtitle">Welcome. Please enter your partner passcode to access pitch decks and campaign strategy.</p>
      
      <form id="login-form" onsubmit="handleLogin(event)">

          <label for="passcode">Partner Passcode</label>
          <div class="password-wrapper">
            <input type="password" id="passcode" class="password-input" placeholder="••••••••" required autocomplete="current-password">
            <button type="button" class="visibility-toggle" onclick="togglePasswordVisibility()" aria-label="Toggle password visibility">
              <span class="material-symbols-outlined" id="visibility-icon">visibility</span>
            </button>
          </div>
        </div>

        <button type="submit" id="submit-btn" class="access-btn">
          <span class="spinner" id="btn-spinner"></span>
          <span id="btn-text">Access Portal</span>
          <span class="material-symbols-outlined">vpn_key</span>
        </button>

        <div class="error-msg" id="error-message">
          <span class="material-symbols-outlined">error</span>
          <span>Invalid passcode. Please try again.</span>
        </div>
      </form>
    </div>
  </div>

    // Helper functions
    function hexToBuffer(hex) {
      const bytes = new Uint8Array(hex.length / 2);
      for (let i = 0; i < bytes.length; i++) {
        bytes[i] = parseInt(hex.substr(i * 2, 2), 16);
      }
      return bytes.buffer;
    }

    function togglePasswordVisibility() {
      const passwordInput = document.getElementById('passcode');
      const icon = document.getElementById('visibility-icon');
      if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        icon.textContent = 'visibility_off';
      } else {
        passwordInput.type = 'password';
        icon.textContent = 'visibility';
      }
    }

    async function decryptPayload(password) {
      const salt = hexToBuffer(ENCRYPTED_CONFIG.salt);
      const iv = hexToBuffer(ENCRYPTED_CONFIG.iv);
      const authTag = hexToBuffer(ENCRYPTED_CONFIG.authTag);
      const encryptedData = hexToBuffer(ENCRYPTED_CONFIG.encryptedData);

      // Concatenate ciphertext and auth tag for Web Crypto AES-GCM
      const combined = new Uint8Array(encryptedData.byteLength + authTag.byteLength);
      combined.set(new Uint8Array(encryptedData), 0);
      combined.set(new Uint8Array(authTag), encryptedData.byteLength);

      const enc = new TextEncoder();
      const passwordKey = await window.crypto.subtle.importKey(
        'raw',
        enc.encode(password),
        'PBKDF2',
        false,
        ['deriveKey']
      );

      const key = await window.crypto.subtle.deriveKey(
        {
          name: 'PBKDF2',
          salt: salt,
          iterations: ENCRYPTED_CONFIG.iterations,
          hash: 'SHA-256'
        },
        passwordKey,
        { name: 'AES-GCM', length: 256 },
        false,
        ['decrypt']
      );

      const decrypted = await window.crypto.subtle.decrypt(
        {
          name: 'AES-GCM',
          iv: iv,
          tagLength: 128
        },
        key,
        combined
      );

      const dec = new TextDecoder();
      return dec.decode(decrypted);
    }

    function showUnlocked(decryptedHTML) {
      const loginPortal = document.getElementById('login-portal');
      const unlockedContent = document.getElementById('unlocked-content');
      const logoutBtn = document.getElementById('logout-button');

      // Hide login, show content with animations
      loginPortal.style.display = 'none';
      logoutBtn.style.display = 'flex';
      unlockedContent.innerHTML = decryptedHTML;
      unlockedContent.style.display = 'block';
      
      // Trigger reflow then transition opacity
      setTimeout(() => {
        unlockedContent.style.opacity = '1';
      }, 50);
    }

    async function handleLogin(event) {
      event.preventDefault();
      
      const passwordInput = document.getElementById('passcode');
      const submitBtn = document.getElementById('submit-btn');
      const spinner = document.getElementById('btn-spinner');
      const btnText = document.getElementById('btn-text');
      const errorMsg = document.getElementById('error-message');

      const password = passwordInput.value;
      
      // Update UI state to loading
      submitBtn.disabled = true;
      spinner.style.display = 'block';
      btnText.textContent = 'Decrypting...';
      errorMsg.style.display = 'none';

      // Small timeout to allow UI update before cryptographic CPU work
      setTimeout(async () => {
        try {
          const decryptedHTML = await decryptPayload(password);
          
          // Store passcode in sessionStorage for session persistence
          sessionStorage.setItem('client_portal_pass', password);
          
          showUnlocked(decryptedHTML);
        } catch (e) {
          console.error(e);
          // Show error and reset button
          errorMsg.style.display = 'flex';
          submitBtn.disabled = false;
          spinner.style.display = 'none';
          btnText.textContent = 'Access Portal';
          passwordInput.value = '';
          passwordInput.focus();
        }
      }, 100);
    }

    function logout() {
      sessionStorage.removeItem('client_portal_pass');
      window.location.reload();
    }

    // Auto-login if session persists
    window.addEventListener('DOMContentLoaded', async () => {
      const savedPass = sessionStorage.getItem('client_portal_pass');
      if (savedPass) {
        try {
          const decryptedHTML = await decryptPayload(savedPass);
          showUnlocked(decryptedHTML);
        } catch (e) {
          // If cached session decryption fails (e.g. payload changed), clear it
          sessionStorage.removeItem('client_portal_pass');
        }
      }
    });
  </script>
