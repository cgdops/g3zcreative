name: Build pSEO and Generate Sitemap

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Step 1: Build pSEO pages ──────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build pSEO HTML
        run: npm run build

      # ── Step 2: Clean up build artifacts before packaging ─────────────────
      - name: Remove build-only files
        run: rm -rf node_modules scripts package.json package-lock.json

      # ── Step 3: Generate sitemap ──────────────────────────────────────────
      - name: Generate Sitemap
        uses: cicirello/generate-sitemap@v1
        with:
          base-url-path: 'https://g3zcreative.com/'
          path-to-root: '.'

      - name: Commit and Push Sitemap
        uses: EndBug/add-and-commit@v9
        with:
          add: 'sitemap.xml'
          message: 'Docs: Auto-generated sitemap.xml'
          github_token: ${{ secrets.GITHUB_TOKEN }}
