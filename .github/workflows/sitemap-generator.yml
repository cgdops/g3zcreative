name: Build Blog and Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Step 1: Build blog pages from _posts/*.md ──────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install blog dependencies
        run: npm install

      - name: Build blog HTML
        run: node scripts/build-blog.js

      # ── Step 2: Clean up build artifacts before packaging ─────────────────
      - name: Remove build-only files
        run: rm -rf node_modules scripts _posts package.json package-lock.json

      # ── Step 3: Generate sitemap (now includes /blog/* pages) ─────────────
      - name: Generate Sitemap
        uses: cicirello/generate-sitemap@v1
        with:
          base-url-path: 'https://g3zcreative.com/'
          path-to-root: '.'

      - name: Commit and Push Sitemap
        uses: EndBug/add-and-commit@v9
        with:
          add: 'sitemap.xml'
          message: 'Docs: Auto-generated sitemap.xml'
          github_token: ${{ secrets.GITHUB_TOKEN }}

      # ── Step 4: Deploy to GitHub Pages ────────────────────────────────────
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4